<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8"/>
 <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
 <title>Students — SCRS</title>
 <style>
 * { margin: 0; padding: 0; box-sizing: border-box; }
 body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; color: #333; }
 header { background: linear-gradient(135deg, #1a3c5e, #2e7bcf); color: white; padding: 20px 40px; }
 header h1 { font-size: 1.6rem; }
 nav { background: #14304f; display: flex; gap: 4px; padding: 0 30px; }
 nav a { color: #a9c7e8; text-decoration: none; padding: 12px 18px; font-size: 0.9rem; transition: all 0.2s; }
 nav a:hover, nav a.active { color: white; background: #2e7bcf; }
 .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; display: grid; grid-template-columns: 380px 1fr; gap: 24px; }
 .section { background: white; border-radius: 10px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
 .section h2 { font-size: 1.1rem; color: #1a3c5e; margin-bottom: 18px; border-bottom: 2px solid #e8f0fe; padding-bottom: 10px; }
 .form-group { margin-bottom: 14px; }
 label { display: block; font-size: 0.85rem; font-weight: 600; color: #555; margin-bottom: 5px; }
 input, select { width: 100%; padding: 9px 12px; border: 1.5px solid #d0dff0; border-radius: 6px; font-size: 0.9rem; transition: border 0.2s; }
 input:focus, select:focus { outline: none; border-color: #2e7bcf; }
 .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-weight: 600; width: 100%; margin-top: 4px; }
 .btn-primary { background: #2e7bcf; color: white; }
 .btn-primary:hover { background: #1a5fa8; }
 .btn-danger { background: #dc3545; color: white; padding: 5px 10px; width: auto; font-size: 0.8rem; border-radius: 4px; }
 .btn-warning { background: #ffc107; color: #333; padding: 5px 10px; width: auto; font-size: 0.8rem; border-radius: 4px; }
 table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
 th { background: #f0f4f8; padding: 10px 12px; text-align: left; color: #555; font-weight: 600; }
 td { padding: 10px 12px; border-bottom: 1px solid #f0f4f8; vertical-align: middle; }
 tr:hover td { background: #f9fbff; }
 .alert { padding: 10px 14px; border-radius: 6px; margin-bottom: 14px; font-size: 0.88rem; display: none; }
 .alert-success { background: #d1e7dd; color: #0a5c36; }
 .alert-error { background: #f8d7da; color: #842029; }
 </style>
</head>
<body>
 <header><h1>Student Course Registration System</h1></header>
 <nav>
 <a href="index.html">Dashboard</a>
 <a href="students.html" class="active">Students</a>
 <a href="courses.html">Courses</a>
 <a href="registrations.html">Registrations</a>
 </nav>

 <div class="container">
 <div class="section">
 <h2 id="formTitle">Add New Student</h2>
 <div class="alert alert-success" id="successMsg"></div>
 <div class="alert alert-error" id="errorMsg"></div>
 <div class="form-group">
 <label>Full Name *</label>
 <input type="text" id="name" placeholder="e.g., Ali Hassan"/>
 </div>
 <div class="form-group">
 <label>Email *</label>
 <input type="email" id="email" placeholder="e.g., ali@student.edu"/>
 </div>
 <div class="form-group">
 <label>Roll Number *</label>
 <input type="text" id="rollNumber" placeholder="e.g., CS-2021-001"/>
 </div>
 <div class="form-group">
 <label>Department *</label>
 <select id="department">
 <option value="">Select Department</option>
 <option>Computer Science</option>
 <option>Software Engineering</option>
 <option>Information Technology</option>
 <option>Electrical Engineering</option>
 </select>
 </div>
 <div class="form-group">
 <label>Semester *</label>
 <select id="semester">
 <option value="">Select Semester</option>
 <option value="1">1st</option><option value="2">2nd</option>
 <option value="3">3rd</option><option value="4">4th</option>
 <option value="5">5th</option><option value="6">6th</option>
 <option value="7">7th</option><option value="8">8th</option>
 </select>
 </div>
 <button class="btn btn-primary" onclick="saveStudent()">Save Student</button>
 <button class="btn" style="background:#e8f0fe;color:#1a3c5e;margin-top:8px;" onclick="resetForm()">Reset</button>
 <input type="hidden" id="editId"/>
 </div>

 <div class="section">
 <h2>All Students</h2>
 <table>
 <thead><tr><th>Name</th><th>Roll No</th><th>Department</th><th>Sem</th><th>Actions</th></tr></thead>
 <tbody id="studentTable"><tr><td colspan="5" style="text-align:center;color:#999;">Loading...</td></tr></tbody>
 </table>
 </div>
 </div>

 <script>
 const API = 'http://localhost:3000/api/students';

 async function loadStudents() {
 const res = await fetch(API);
 const data = await res.json();
 const tbody = document.getElementById('studentTable');
 if (!data.data || data.data.length === 0) {
 tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#999;">No students found</td></tr>';
 return;
 }
 tbody.innerHTML = data.data.map(s => `
 <tr>
 <td><strong>${s.name}</strong><br><small style="color:#888">${s.email}</small></td>
 <td>${s.rollNumber}</td>
 <td>${s.department}</td>
 <td>${s.semester}</td>
 <td>
 <button class="btn btn-warning" onclick="editStudent('${s._id}','${s.name}','${s.email}','${s.rollNumber}','${s.department}',${s.semester})">Edit</button>
 <button class="btn btn-danger" onclick="deleteStudent('${s._id}')">Delete</button>
 </td>
 </tr>
 `).join('');
 }

 async function saveStudent() {
 const id = document.getElementById('editId').value;
 const body = {
 name: document.getElementById('name').value,
 email: document.getElementById('email').value,
 rollNumber: document.getElementById('rollNumber').value,
 department: document.getElementById('department').value,
 semester: parseInt(document.getElementById('semester').value)
 };
 try {
 const res = await fetch(id ? `${API}/${id}` : API, {
 method: id ? 'PUT' : 'POST',
 headers: { 'Content-Type': 'application/json' },
 body: JSON.stringify(body)
 });
 const data = await res.json();
 if (data.success) {
 showAlert('successMsg', data.message);
 resetForm(); loadStudents();
 } else { showAlert('errorMsg', data.message); }
 } catch (e) { showAlert('errorMsg', 'Server error. Is the server running?'); }
 }

 function editStudent(id, name, email, roll, dept, sem) {
 document.getElementById('editId').value = id;
 document.getElementById('name').value = name;
 document.getElementById('email').value = email;
 document.getElementById('rollNumber').value = roll;
 document.getElementById('department').value = dept;
 document.getElementById('semester').value = sem;
 document.getElementById('formTitle').textContent = 'Edit Student';
 }

 async function deleteStudent(id) {
 if (!confirm('Delete this student?')) return;
 const res = await fetch(`${API}/${id}`, { method: 'DELETE' });
 const data = await res.json();
 if (data.success) { showAlert('successMsg', data.message); loadStudents(); }
 else showAlert('errorMsg', data.message);
 }

 function resetForm() {
 ['name','email','rollNumber','editId'].forEach(id => document.getElementById(id).value = '');
 document.getElementById('department').value = '';
 document.getElementById('semester').value = '';
 document.getElementById('formTitle').textContent = 'Add New Student';
 }

 function showAlert(id, msg) {
 const el = document.getElementById(id);
 el.textContent = msg; el.style.display = 'block';
 setTimeout(() => el.style.display = 'none', 3000);
 }

 loadStudents();
 </script>
</body>
</html>
