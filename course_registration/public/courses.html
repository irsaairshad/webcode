<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8"/>
 <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
 <title>Courses — SCRS</title>
 <style>
 * { margin: 0; padding: 0; box-sizing: border-box; }
 body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; color: #333; }
 header { background: linear-gradient(135deg, #1a3c5e, #2e7bcf); color: white; padding: 20px 40px; }
 header h1 { font-size: 1.6rem; }
 nav { background: #14304f; display: flex; gap: 4px; padding: 0 30px; }
 nav a { color: #a9c7e8; text-decoration: none; padding: 12px 18px; font-size: 0.9rem; transition: all 0.2s; }
 nav a:hover, nav a.active { color: white; background: #2e7bcf; }
 .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; display: grid; grid-template-columns: 380px 1fr; gap: 24px; }
 .section { background: white; border-radius: 10px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
 .section h2 { font-size: 1.1rem; color: #1a3c5e; margin-bottom: 18px; border-bottom: 2px solid #e8f0fe; padding-bottom: 10px; }
 .form-group { margin-bottom: 14px; }
 label { display: block; font-size: 0.85rem; font-weight: 600; color: #555; margin-bottom: 5px; }
 input, select { width: 100%; padding: 9px 12px; border: 1.5px solid #d0dff0; border-radius: 6px; font-size: 0.9rem; }
 input:focus, select:focus { outline: none; border-color: #2e7bcf; }
 .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; font-weight: 600; width: 100%; margin-top: 4px; }
 .btn-primary { background: #2e7bcf; color: white; }
 .btn-danger { background: #dc3545; color: white; padding: 5px 10px; width: auto; font-size: 0.8rem; border-radius: 4px; }
 .btn-warning { background: #ffc107; color: #333; padding: 5px 10px; width: auto; font-size: 0.8rem; border-radius: 4px; }
 table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
 th { background: #f0f4f8; padding: 10px 12px; text-align: left; color: #555; font-weight: 600; }
 td { padding: 10px 12px; border-bottom: 1px solid #f0f4f8; vertical-align: middle; }
 tr:hover td { background: #f9fbff; }
 .alert { padding: 10px 14px; border-radius: 6px; margin-bottom: 14px; font-size: 0.88rem; display: none; }
 .alert-success { background: #d1e7dd; color: #0a5c36; }
 .alert-error { background: #f8d7da; color: #842029; }
 .badge { display: inline-block; padding: 3px 8px; border-radius: 10px; font-size: 0.78rem; font-weight: 600; background: #e8f0fe; color: #1a3c5e; }
 </style>
</head>
<body>
 <header><h1>Student Course Registration System</h1></header>
 <nav>
 <a href="index.html">Dashboard</a>
 <a href="students.html">Students</a>
 <a href="courses.html" class="active">Courses</a>
 <a href="registrations.html">Registrations</a>
 </nav>

 <div class="container">
 <div class="section">
 <h2 id="formTitle">Add New Course</h2>
 <div class="alert alert-success" id="successMsg"></div>
 <div class="alert alert-error" id="errorMsg"></div>
 <div class="form-group">
 <label>Course Code *</label>
 <input type="text" id="courseCode" placeholder="e.g., CSC337"/>
 </div>
 <div class="form-group">
 <label>Course Title *</label>
 <input type="text" id="title" placeholder="e.g., Advanced Web Technologies"/>
 </div>
 <div class="form-group">
 <label>Credit Hours *</label>
 <select id="creditHours">
 <option value="">Select</option>
 <option value="1">1</option><option value="2">2</option>
 <option value="3">3</option><option value="4">4</option>
 </select>
 </div>
 <div class="form-group">
 <label>Instructor *</label>
 <input type="text" id="instructor" placeholder="e.g., Dr. Ahmad Raza"/>
 </div>
 <div class="form-group">
 <label>Department *</label>
 <select id="department">
 <option value="">Select Department</option>
 <option>Computer Science</option>
 <option>Software Engineering</option>
 <option>Information Technology</option>
 <option>Electrical Engineering</option>
 </select>
 </div>
 <div class="form-group">
 <label>Max Capacity *</label>
 <input type="number" id="maxCapacity" placeholder="e.g., 30" value="30"/>
 </div>
 <button class="btn btn-primary" onclick="saveCourse()">Save Course</button>
 <button class="btn" style="background:#e8f0fe;color:#1a3c5e;margin-top:8px;" onclick="resetForm()">Reset</button>
 <input type="hidden" id="editId"/>
 </div>

 <div class="section">
 <h2>All Courses</h2>
 <table>
 <thead><tr><th>Code</th><th>Title</th><th>Instructor</th><th>Cr.Hrs</th><th>Cap</th><th>Actions</th></tr></thead>
 <tbody id="courseTable"><tr><td colspan="6" style="text-align:center;color:#999;">Loading...</td></tr></tbody>
 </table>
 </div>
 </div>

 <script>
 const API = 'http://localhost:3000/api/courses';

 async function loadCourses() {
 const res = await fetch(API);
 const data = await res.json();
 const tbody = document.getElementById('courseTable');
 if (!data.data || data.data.length === 0) {
 tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#999;">No courses found</td></tr>';
 return;
 }
 tbody.innerHTML = data.data.map(c => `
 <tr>
 <td><span class="badge">${c.courseCode}</span></td>
 <td>${c.title}<br><small style="color:#888">${c.department}</small></td>
 <td>${c.instructor}</td>
 <td style="text-align:center">${c.creditHours}</td>
 <td style="text-align:center">${c.maxCapacity}</td>
 <td>
 <button class="btn btn-warning" onclick="editCourse('${c._id}','${c.courseCode}','${c.title}','${c.creditHours}','${c.instructor}','${c.department}',${c.maxCapacity})">Edit</button>
 <button class="btn btn-danger" onclick="deleteCourse('${c._id}')">Delete</button>
 </td>
 </tr>
 `).join('');
 }

 async function saveCourse() {
 const id = document.getElementById('editId').value;
 const body = {
 courseCode: document.getElementById('courseCode').value,
 title: document.getElementById('title').value,
 creditHours: parseInt(document.getElementById('creditHours').value),
 instructor: document.getElementById('instructor').value,
 department: document.getElementById('department').value,
 maxCapacity: parseInt(document.getElementById('maxCapacity').value)
 };
 try {
 const res = await fetch(id ? `${API}/${id}` : API, {
 method: id ? 'PUT' : 'POST',
 headers: { 'Content-Type': 'application/json' },
 body: JSON.stringify(body)
 });
 const data = await res.json();
 if (data.success) { showAlert('successMsg', data.message); resetForm(); loadCourses(); }
 else showAlert('errorMsg', data.message);
 } catch (e) { showAlert('errorMsg', 'Server error. Is the server running?'); }
 }

 function editCourse(id, code, title, cr, inst, dept, cap) {
 document.getElementById('editId').value = id;
 document.getElementById('courseCode').value = code;
 document.getElementById('title').value = title;
 document.getElementById('creditHours').value = cr;
 document.getElementById('instructor').value = inst;
 document.getElementById('department').value = dept;
 document.getElementById('maxCapacity').value = cap;
 document.getElementById('formTitle').textContent = 'Edit Course';
 }

 async function deleteCourse(id) {
 if (!confirm('Delete this course?')) return;
 const res = await fetch(`${API}/${id}`, { method: 'DELETE' });
 const data = await res.json();
 if (data.success) { showAlert('successMsg', data.message); loadCourses(); }
 else showAlert('errorMsg', data.message);
 }

 function resetForm() {
 ['courseCode','title','instructor','editId'].forEach(id => document.getElementById(id).value = '');
 document.getElementById('creditHours').value = '';
 document.getElementById('department').value = '';
 document.getElementById('maxCapacity').value = 30;
 document.getElementById('formTitle').textContent = 'Add New Course';
 }

 function showAlert(id, msg) {
 const el = document.getElementById(id);
 el.textContent = msg; el.style.display = 'block';
 setTimeout(() => el.style.display = 'none', 3000);
 }

 loadCourses();
 </script>
</body>
</html>
